{% extends "layout.html" %}
{% block main_class %}p-6{% endblock %}
{% block content %}

{% block admin_content %}{% endblock %}

<!-- Delete confirmation modal -->
<div id="modal-delete-confirm" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-delete-title">
  <div class="modal-card max-w-sm w-full mx-4">
    <header class="modal-header">
      <h3 id="modal-delete-title" class="text-lg font-semibold">{{ base.translate["delete"] }}</h3>
      <button class="modal-close" onclick="closeDeleteModal()" aria-label="Close">
        <i class="fas fa-times"></i>
      </button>
    </header>
    <div class="px-6 py-4">
      <p id="modal-delete-message" class="text-zinc-600 dark:text-zinc-300 mb-6"></p>
      <div class="flex justify-end gap-3">
        <button class="button__outline" onclick="closeDeleteModal()">{{ base.translate["cancel"] }}</button>
        <a id="modal-delete-href" href="#" class="button danger">
          <i class="fas fa-trash mr-2"></i>{{ base.translate["delete"] }}
        </a>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  window.openDeleteModal = function (url, message) {
    document.getElementById('modal-delete-message').textContent = message;
    document.getElementById('modal-delete-href').href = url;
    document.getElementById('modal-delete-confirm').classList.add('is-active');
  };

  window.closeDeleteModal = function () {
    document.getElementById('modal-delete-confirm').classList.remove('is-active');
  };

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeDeleteModal();
  });
})();
</script>
{% endblock %}
