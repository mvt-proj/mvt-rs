<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img">
<title>MVT Server architecture: all mode with shared writers</title>
<desc>Diagram showing three peer instances that each hold their own in-memory config, all able to write directly to a shared SQLite database and a shared Redis cache. Each instance's watcher reads config_version directly from the shared file instead of polling another instance's API.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="900" height="480" fill="#ffffff"/>

<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">MVT Server — all mode (shared writers)</text>
<text x="450" y="50" text-anchor="middle" font-size="11.5" fill="#6b7280">any instance can write; all instances read the same shared state</text>

<!-- Instance A -->
<rect x="60" y="80" width="240" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
<text x="180" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">instance A</text>
<text x="180" y="135" text-anchor="middle" font-size="10.5" fill="#2563eb">in-mem config</text>
<text x="180" y="152" text-anchor="middle" font-size="9.5" fill="#6b7280">full router · read + write</text>

<!-- Instance B -->
<rect x="330" y="80" width="240" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
<text x="450" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">instance B</text>
<text x="450" y="135" text-anchor="middle" font-size="10.5" fill="#2563eb">in-mem config</text>
<text x="450" y="152" text-anchor="middle" font-size="9.5" fill="#6b7280">full router · read + write</text>

<!-- Instance C -->
<rect x="600" y="80" width="240" height="100" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
<text x="720" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">instance C</text>
<text x="720" y="135" text-anchor="middle" font-size="10.5" fill="#2563eb">in-mem config</text>
<text x="720" y="152" text-anchor="middle" font-size="9.5" fill="#6b7280">full router · read + write</text>

<!-- Drops from instances to bus -->
<line x1="180" y1="180" x2="180" y2="210" stroke="#3b82f6" stroke-width="1.4"/>
<line x1="450" y1="180" x2="450" y2="210" stroke="#3b82f6" stroke-width="1.4"/>
<line x1="720" y1="180" x2="720" y2="210" stroke="#3b82f6" stroke-width="1.4"/>
<line x1="180" y1="210" x2="720" y2="210" stroke="#3b82f6" stroke-width="1.4"/>

<text x="450" y="234" text-anchor="middle" font-size="10.5" fill="#374151">watcher reads config_version directly from the shared file</text>

<!-- Down arrows to shared stores -->
<line x1="320" y1="210" x2="320" y2="290" stroke="#3b82f6" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="640" y1="210" x2="640" y2="290" stroke="#3b82f6" stroke-width="1.4" marker-end="url(#arrow)"/>

<!-- Shared SQLite -->
<rect x="180" y="290" width="280" height="95" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
<text x="320" y="325" text-anchor="middle" font-size="14" font-weight="600" fill="#4c1d95">shared SQLite</text>
<text x="320" y="345" text-anchor="middle" font-size="10.5" fill="#6d28d9">/shared/mvtrs.db</text>
<text x="320" y="363" text-anchor="middle" font-size="9.5" fill="#9ca3af">any instance may write · config_version bumped on change</text>

<!-- Shared Redis -->
<rect x="500" y="290" width="280" height="95" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
<text x="640" y="325" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">shared Redis</text>
<text x="640" y="345" text-anchor="middle" font-size="10.5" fill="#047857">tiles + per-layer ETag</text>
<text x="640" y="363" text-anchor="middle" font-size="9.5" fill="#9ca3af">identical read/write from every instance</text>

<!-- Footer notes -->
<text x="60" y="420" font-size="12" font-weight="600" fill="#1f2937">Why this differs from owner/client mode:</text>
<text x="60" y="440" font-size="11" fill="#374151">- No internal sync API or snapshot pull: every instance sees config_version by reading the shared file itself.</text>
<text x="60" y="458" font-size="11" fill="#374151">- No single writer: any instance can update config or tiles, so there is no owner to bottleneck writes.</text>

<!-- Legend -->
<line x1="60" y1="472" x2="90" y2="472" stroke="#3b82f6" stroke-width="1.4"/>
<text x="96" y="476" font-size="10" fill="#374151">instance ↔ shared storage</text>

</svg>
