# MVT-RS Configuration Example
# Copy this file to config/config.yaml and fill in your values.
#
# Priority order (highest to lowest):
#   CLI args  >  this YAML file  >  MVT_xxx environment variables  >  defaults
#
# Environment variable mapping: use MVT_ prefix with __ as sub-key separator.
# Example: MVT_SERVER__PORT=5887 overrides server.port below.

# ─── Server ───────────────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 5887

# ─── PostgreSQL Databases ─────────────────────────────────────────────────────
# At least one entry named "default" is required.
# Additional named databases can be added with different keys.
postgres_databases:
  pool_min: 2
  pool_max: 5
  default: "postgres://user:password@host:5432/dbname"
  # secondary: "postgres://user:password@host2:5432/dbname2"

# ─── Database Pool & Cache ────────────────────────────────────────────────────
database:
  sqlite_path: "mvtrs.db"
  # redis_url: "redis://localhost:6379"   # omit to use disk cache instead

# ─── Security ─────────────────────────────────────────────────────────────────
# Both secrets must be at least 32 characters long. Use strong random values.
security:
  jwt_secret: "change-me-to-a-random-secret-at-least-32-chars-long"
  session_secret: "change-me-to-another-random-secret-at-least-64-chars-long-here"
  session_duration_minutes: 20   # session TTL in minutes (default: 20)

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  config: "config"
  cache: "cache"
  assets: "map_assets"
  plugins: "plugins"   # directory scanned for Lua plugin files at startup

# ─── Clustering / multi-instance ──────────────────────────────────────────────
# Keep in-memory config (catalog, categories, users, groups, styles) fresh across
# several instances behind a load balancer. Default is a single standalone server.
cluster:
  # standalone | shared | owner | client
  #   standalone : single instance (default).
  #   shared     : several instances on the SAME host sharing one SQLite file
  #                via a shared volume (all must open the same file path; typically
  #                same-host jails/containers, as SQLite over NFS is unreliable).
  #   owner      : holds the single SQLite and exposes the internal sync API
  #                (situation 2, cross-host).
  #   client     : no local SQLite; pulls config from the owner over HTTP
  #                (situation 2, cross-host).
  mode: "standalone"

  # How often (seconds) each non-owner instance polls for config changes.
  config_watch_interval_secs: 10

  # Required when mode = client (ignored for other modes): base URL of the owner instance.
  # owner_url: "https://owner-host:5887"

  # Required when mode = owner or client: shared secret authorizing the internal
  # /internal/config/* API. Use a strong random value (>= 16 chars). That API
  # ships config including password hashes, so this traffic MUST go over TLS or a
  # trusted private network, and /internal must not be exposed publicly.
  # shared_secret: "change-me-to-a-random-cluster-secret"

# Env-var equivalents: MVT_CLUSTER__MODE, MVT_CLUSTER__CONFIG_WATCH_INTERVAL_SECS,
# MVT_CLUSTER__OWNER_URL, MVT_CLUSTER__SHARED_SECRET
